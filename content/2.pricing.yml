title: Um plano para cada fase
description: Comece simples e evolua conforme seu sistema cresce. Notas, hábitos e organização em um só lugar.
seo:
  title: Planos
  description: Escolha o plano ideal para o seu Second Brain.
navigation.icon: i-lucide-credit-card
plans:
  - title: Pessoal
    description: Para quem quer capturar e organizar sem fricção.
    price:
      month: R$ 19
      year: R$ 190
    button:
      label: Começar
      color: neutral
      variant: subtle
    features:
      - Notas ilimitadas
      - Tags e coleções
      - Caixa de entrada para capturas
      - Busca rápida
      - Check-in diário
      - Rastreamento básico de hábitos
  - title: Pro
    description: Para monitorar hábitos com profundidade e criar consistência.
    price:
      month: R$ 39
      year: R$ 390
    highlight: true
    scale: true
    button:
      label: Assinar Pro
    features:
      - Tudo do Pessoal
      - Métricas semanais e mensais
      - Heatmap de consistência
      - Revisão semanal guiada
      - Hábitos quantitativos (minutos, páginas, vezes)
      - Regras flexíveis (dias de descanso / metas mínimas)
  - title: Equipe
    description: Para compartilhar contexto e manter alinhamento.
    price:
      month: R$ 79
      year: R$ 790
    button:
      label: Falar com a gente
      color: neutral
      variant: subtle
    features:
      - Tudo do Pro
      - Espaços compartilhados
      - Permissões por membro
      - Padrões de organização por equipe
      - Histórico e auditoria básica
      - Suporte prioritário
logos:
  title: Confiável para o dia a dia
  icons:
    - i-simple-icons-amazonaws
    - i-simple-icons-heroku
    - i-simple-icons-netlify
    - i-simple-icons-vercel
    - i-simple-icons-cloudflare
faq:
  title: Perguntas frequentes
  description: Respostas rápidas para começar com confiança.
  items:
    - label: O Second Brain é um SaaS?
      content: Sim. Você acessa seus dados de qualquer lugar e em qualquer dispositivo, sem se preocupar com infraestrutura.
    - label: Meus dados ficam seguros?
      content: O objetivo é manter uma arquitetura segura e server-side para integrações e banco (Supabase), com boas práticas de validação e acesso.
    - label: Posso cancelar quando quiser?
      content: Sim. Você pode cancelar a qualquer momento e manter o controle sobre seus dados.
    - label: Posso mudar de plano depois?
      content: Pode. Comece no Pessoal e evolua para o Pro/Equipe conforme sua necessidade.
    - label: Como funcionam hábitos no Second Brain?
      content: Hábitos são conectados a contexto (notas/reflexões). O foco é consistência e tendência, não perfeição.
    - label: Vocês oferecem suporte?
      content: Sim — com prioridade maior nos planos Pro e Equipe.
